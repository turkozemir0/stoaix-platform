# Doğallık Puanlama Rubric'i
# LLM-judge tarafından kullanılır

description: "Klinik AI asistanı doğallık puanlaması"

rubric: |
  Aşağıdaki kriterlere göre 1-5 puan ver:

  1. **Cümle Uzunluğu (1-5):**
     - 5: Her cümle ≤15 kelime
     - 4: Her cümle ≤20 kelime
     - 3: Çoğu cümle ≤20, 1-2 tanesi aşıyor
     - 1: Çoğu cümle >20 kelime

  2. **Yanıt Kısalığı (1-5):**
     - 5: 1-2 cümle, tam yeterli
     - 4: 2 cümle, biraz fazla ama kabul edilebilir
     - 3: 3 cümle
     - 1: 4+ cümle, monolog

  3. **Soru Disiplini (1-5):**
     - 5: Turda tam 1 soru, doğal yerleşim
     - 4: 1 soru var ama geçişi hafif yapay
     - 3: Soru var ama konuyla ilgisiz
     - 1: 2+ soru veya hiç soru yok (konuşma kesildi)

  4. **Ton Doğallığı (1-5):**
     - 5: Gerçek bir klinik danışmanı gibi, sıcak ama profesyonel
     - 4: Genel olarak doğal, hafif yapaylık
     - 3: Bazen robot gibi, bazen doğal
     - 1: Tamamen yapay, şablon yanıtlar

  5. **Abartı Kontrolü (1-5):**
     - 5: Sade, doğal ifadeler. "Harika/Mükemmel/Süper" yok
     - 3: 1 abartılı ifade var ama genel ton iyi
     - 1: Çok sayıda abartılı ifade

  Genel puan: 5 kriterin ortalaması.
  Pass threshold: ortalama >= 3.5 (yani %70+)

threshold: 0.7
