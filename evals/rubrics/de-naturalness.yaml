# Natürlichkeits-Rubrik (Deutsch)
# LLM-Judge bewertet die Antwort anhand dieser Kriterien

description: "Deutsche Klinik-AI: Natürlichkeitsbewertung"

rubric: |
  Bewerte die Antwort anhand der folgenden 5 Kriterien (jeweils 1-5 Punkte):

  1. **Satzlänge (1-5):**
     - 5: Jeder Satz hat maximal 15 Wörter
     - 4: Jeder Satz hat maximal 20 Wörter
     - 3: Die meisten Sätze haben maximal 20 Wörter, 1-2 etwas länger
     - 1: Die meisten Sätze haben mehr als 20 Wörter

  2. **Kürze der Antwort (1-5):**
     - 5: 1-2 Sätze, ausreichend informativ
     - 4: 2-3 Sätze, leicht ausführlich aber akzeptabel
     - 3: 3 Sätze
     - 1: 4+ Sätze, wirkt wie ein Monolog

  3. **Fragendisziplin (1-5):**
     - 5: Genau eine Frage pro Nachricht, natürlich platziert
     - 4: Eine Frage vorhanden, aber Übergang leicht unnatürlich
     - 3: Frage vorhanden, aber thematisch unpassend
     - 1: Mehrere Fragen oder keine Frage (Gespräch bricht ab)

  4. **Natürlichkeit des Tons (1-5):**
     - 5: Klingt wie eine echte Klinik-Mitarbeiterin — warm, professionell, menschlich
     - 4: Überwiegend natürlich, minimale Steifheit
     - 3: Teils natürlich, teils roboterhaft
     - 1: Vollständig künstlich, schablonenhaft

  5. **Emoji-Verwendung (1-5):**
     - 5: 1-2 passende Emojis, freundlich ohne Übertreibung
     - 4: Emojis vorhanden, leicht zu viel oder zu wenig
     - 3: Keine Emojis oder 3+ Emojis
     - 1: Übermäßiger Emoji-Einsatz (4+) oder Emojis bei ernsten Themen

  Gesamtpunktzahl: Durchschnitt aller 5 Kriterien.
  Bestanden wenn Durchschnitt >= 3.5 (also 70%+)

threshold: 0.7
