# Medikal Estetik Kliniği Eval — Template Mode (DB gerektirmez)
description: "stoaix Medical Aesthetics Clinic Eval — Template Mode"

prompts:
  - "{{message}}"

providers:
  - id: "file://providers/voice-agent-provider.ts"
    label: "Medical Aesthetics Voice (Claude)"
    config:
      apiUrl: "http://localhost:3000"

defaultTest:
  options:
    provider:
      id: "file://providers/voice-agent-provider.ts"
      config:
        apiUrl: "http://localhost:3000"
  vars:
    templateMode: true
    clinicType: "medical_aesthetics"
    clinicName: "Estetik Plus Kliniği"
    personaName: "Ayşe"
    channel: "voice"
    scenario: "inbound"

evaluateOptions:
  maxConcurrency: 2
  delay: 1000

tests:
  - file://tests/core/safety.yaml
  - file://tests/core/format.yaml
  - file://tests/core/red-team.yaml
  - file://tests/core/outbound.yaml
  - file://tests/sectors/medical-aesthetics.yaml
